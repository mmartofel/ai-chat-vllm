<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Chat Assistant</title>
    <link rel="stylesheet" href="style.css" />
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.7.0/styles/github-dark.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.7.0/highlight.min.js"></script>
    <script defer src="app.js"></script>
</head>

<body class="bg-gray-100 h-screen flex font-sans overflow-hidden">

    <div id="app" class="w-full h-full flex overflow-hidden">

        <!-- Login screen -->
        <div v-if="!isAuthenticated" class="w-full flex items-center justify-center bg-gray-100">
            <div class="bg-white rounded-2xl shadow-md p-8 w-full max-w-sm">
                <h1 class="text-xl font-bold text-gray-800 mb-6 text-center">AI Chat &mdash; Sign In</h1>
                <form @submit.prevent="login">
                    <div class="mb-4">
                        <label class="block text-sm font-medium text-gray-700 mb-1" for="login-username">Username</label>
                        <input
                            id="login-username"
                            v-model="loginForm.username"
                            type="text"
                            autocomplete="username"
                            required
                            class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-indigo-500 text-sm"
                            :disabled="loginLoading"
                        />
                    </div>
                    <div class="mb-4">
                        <label class="block text-sm font-medium text-gray-700 mb-1" for="login-password">Password</label>
                        <input
                            id="login-password"
                            v-model="loginForm.password"
                            type="password"
                            autocomplete="current-password"
                            required
                            class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-indigo-500 text-sm"
                            :disabled="loginLoading"
                        />
                    </div>
                    <p v-if="loginError" class="text-red-500 text-sm mb-3">{{ loginError }}</p>
                    <button
                        type="submit"
                        class="w-full bg-indigo-600 text-white py-2 rounded-lg hover:bg-indigo-700 disabled:opacity-50 transition-colors font-medium text-sm"
                        :disabled="loginLoading"
                    >
                        {{ loginLoading ? 'Signing in…' : 'Sign In' }}
                    </button>
                </form>
            </div>
        </div>

        <!-- Chat app (shown when authenticated) -->
        <template v-else>

            <!-- Mobile overlay -->
            <div v-if="sidebarOpen" class="sidebar-overlay md:hidden" @click="sidebarOpen = false"></div>

            <!-- Left Sidebar -->
            <aside class="sidebar" :class="{ 'sidebar-open': sidebarOpen }">
                <div class="sidebar-header">
                    <span class="text-xs font-semibold text-gray-400 uppercase tracking-widest">Conversations</span>
                    <button @click="sidebarOpen = false" class="text-gray-500 hover:text-gray-200 md:hidden" title="Close">
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
                    </button>
                </div>

                <button @click="newChat"
                        :disabled="isImageLoading || isStreaming"
                        class="new-chat-btn disabled:opacity-50 disabled:cursor-not-allowed">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"></path></svg>
                    New Chat
                </button>

                <div class="conv-list">
                    <div v-if="conversations.length === 0" class="text-xs text-gray-600 text-center mt-10 px-4 leading-relaxed">
                        No saved conversations yet.<br>Send a message to start one.
                    </div>
                    <div
                        v-for="conv in conversations"
                        :key="conv.id"
                        class="conv-item"
                        :class="{ 'conv-item-active': conv.id === currentConvId }"
                        @click="loadConversation(conv.id)"
                    >
                        <div class="flex-1 min-w-0">
                            <div class="conv-title">{{ conv.title }}</div>
                            <div class="conv-date">{{ formatDate(conv.createdAt) }}</div>
                        </div>
                        <button class="conv-delete" @click.stop="deleteConversation(conv.id)" title="Delete">
                            <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"></path></svg>
                        </button>
                    </div>
                </div>
            </aside>

            <!-- Main Panel -->
            <div class="flex-1 flex flex-col overflow-hidden bg-white min-w-0">

                <!-- Header -->
                <header class="bg-indigo-600 text-white px-4 py-3 flex justify-between items-center shadow-md flex-shrink-0">
                    <div class="flex items-center gap-3">
                        <button @click="sidebarOpen = !sidebarOpen" class="text-indigo-200 hover:text-white focus:outline-none" title="Toggle sidebar">
                            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"></path></svg>
                        </button>
                        <h1 class="text-base font-bold flex items-center gap-2">
                            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"></path></svg>
                            AI Assistant
                        </h1>
                    </div>
                    <div class="flex items-center gap-2">
                        <span class="text-xs bg-indigo-700 px-2 py-1 rounded font-medium">{{ status }}</span>
                        <span v-if="isImageLoading" class="text-xs bg-yellow-500 px-2 py-1 rounded font-medium animate-pulse">
                            ⏳ Processing image…
                        </span>
                        <span class="text-xs text-indigo-200">Welcome, {{ currentUser }}!</span>
                        <button @click="newChat"
                                :disabled="isImageLoading || isStreaming"
                                class="text-xs bg-indigo-500 hover:bg-indigo-400 px-3 py-1.5 rounded transition-colors flex items-center gap-1 font-medium disabled:opacity-50 disabled:cursor-not-allowed"
                                title="Start new conversation">
                            <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"></path></svg>
                            New Chat
                        </button>
                        <a v-if="currentRole === 'admin'" href="/admin.html"
                           :class="(isImageLoading || isStreaming) ? 'pointer-events-none opacity-50' : 'hover:bg-yellow-400'"
                           class="text-xs bg-yellow-500 px-3 py-1.5 rounded transition-colors font-medium text-white">
                          Admin
                        </a>
                        <button @click="logout"
                                :disabled="isImageLoading || isStreaming"
                                class="text-xs bg-red-500 hover:bg-red-400 px-3 py-1.5 rounded transition-colors font-medium disabled:opacity-50 disabled:cursor-not-allowed">
                          Sign Out
                        </button>
                    </div>
                </header>

                <!-- Messages -->
                <div id="chat-container" class="flex-1 overflow-y-auto p-4 space-y-4 bg-gray-50 scroll-smooth">
                    <div v-if="messages.length === 0" class="text-center text-gray-400 mt-20">
                        <svg class="w-10 h-10 mx-auto mb-3 text-gray-300" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M8 12h.01M12 12h.01M16 12h.01M21 12c0 4.418-4.03 8-9 8a9.863 9.863 0 01-4.255-.949L3 20l1.395-3.72C3.512 15.042 3 13.574 3 12c0-4.418 4.03-8 9-8s9 3.582 9 8z"></path></svg>
                        <p class="text-base font-medium">No messages yet.</p>
                        <p class="text-sm mt-1">Start the conversation below!</p>
                    </div>

                    <div v-for="(msg, index) in messages" :key="index" class="flex w-full" :class="msg.role === 'user' ? 'justify-end' : 'justify-start'">
                        <div class="max-w-[85%] rounded-2xl px-4 py-3 shadow-sm"
                             :class="msg.role === 'user' ? 'bg-indigo-600 text-white rounded-br-sm' : 'bg-white text-gray-800 border border-gray-200 rounded-bl-sm'">
                            <div class="text-xs font-semibold mb-1.5 opacity-50 uppercase tracking-wider">
                                {{ msg.role === 'user' ? 'You' : 'AI Model' }}
                            </div>
                            <template v-if="msg.type === 'image'">
                                <img :src="msg.url" :alt="msg.content" class="rounded-lg max-w-full" />
                                <div class="text-xs mt-1 opacity-60">{{ msg.content }}</div>
                            </template>
                            <div v-else-if="msg.role === 'assistant'" class="prose prose-sm max-w-none" v-html="renderMarkdown(msg.content)"></div>
                            <div v-else class="whitespace-pre-wrap text-sm leading-relaxed">{{ msg.content }}</div>
                            <div v-if="msg.role === 'assistant' && msg.durationMs" class="msg-timing">
                                ⏱ {{ (msg.durationMs / 1000).toFixed(1) }}s
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Status Bar -->
                <div class="status-bar">
                    <span v-if="serverInfo.model">Model: <strong>{{ serverInfo.model }}</strong></span>
                    <span v-if="serverInfo.model && serverInfo.url" class="status-sep">•</span>
                    <span v-if="serverInfo.url" class="truncate max-w-xs">{{ serverInfo.url }}</span>
                    <span v-if="lastResponseMs !== null" class="status-sep">•</span>
                    <span v-if="lastResponseMs !== null">Last: {{ (lastResponseMs / 1000).toFixed(1) }}s</span>
                </div>

                <!-- Input Area -->
                <div class="px-3 py-3 bg-white border-t border-gray-200 flex-shrink-0">
                    <form @submit.prevent="sendMessage" class="relative flex items-end gap-2">
                        <!-- Hidden file input triggered by the button below -->
                        <input
                            ref="imageUploadRef"
                            type="file"
                            accept="image/*"
                            class="hidden"
                            @change="e => { if (e.target.files[0]) sendImage(e.target.files[0]); e.target.value = ''; }"
                        />
                        <!-- Upload button -->
                        <button
                            type="button"
                            class="flex-shrink-0 p-2 text-gray-400 hover:text-indigo-600 disabled:opacity-40 transition-colors"
                            :disabled="isStreaming || isImageLoading"
                            @click="imageUploadRef.click()"
                            title="Upload image for analysis">
                            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                      d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0
                                         012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2
                                         2 0 00-2 2v12a2 2 0 002 2z" />
                            </svg>
                        </button>
                        <textarea
                            ref="textareaRef"
                            v-model="userInput"
                            placeholder="Type a message, or /image &lt;prompt&gt; to generate an image…"
                            rows="1"
                            class="w-full p-3 pr-12 rounded-2xl border border-gray-300 focus:outline-none focus:ring-2 focus:ring-indigo-500 shadow-sm transition-all resize-none overflow-hidden min-h-[52px] max-h-[200px] text-sm"
                            :disabled="isStreaming"
                            @input="autoResize"
                            @keydown.enter.exact.prevent="sendMessage"
                            autofocus
                        ></textarea>
                        <button type="submit"
                            class="absolute right-2 bottom-2.5 p-2 bg-indigo-600 text-white rounded-full hover:bg-indigo-700 disabled:opacity-40 transition-colors"
                            :disabled="!userInput.trim() || isStreaming">
                            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 19l9 2-9-18-9 18 9-2zm0 0v-8"></path></svg>
                        </button>
                    </form>
                </div>
            </div>

        </template>
    </div>
</body>
</html>
